version: "2"

linters:
  enable:
    - errcheck      # ensure all errors are handled
    - staticcheck   # comprehensive static analysis (includes gosimple)
    - govet         # reports suspicious constructs
    - ineffassign   # detect unused assignments
    - unused        # find unused code
    - misspell      # fix spelling mistakes
    - exhaustive    # check exhaustiveness of enum switches
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
        - os.Remove
        - os.RemoveAll
    exhaustive:
      default-signifies-exhaustive: true
  exclusions:
    rules:
      - path: ".*_test\\.go"
        linters:
          - errcheck

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - novel-assistant
