{{define "focus.html"}}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Chat Mode — 小說助手</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .focus-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      height: calc(100vh - 160px);
      min-height: 500px;
    }
    .focus-layout.with-preview { grid-template-columns: 1fr 1fr 300px; }
    .film-preview-panel { display: none; flex-direction: column; overflow: hidden; }
    .focus-layout.with-preview .film-preview-panel { display: flex; }
    .film-preview-inner {
      flex: 1; overflow-y: auto; padding: 10px;
      background: #0f0d14; border: 1px solid #2d2540; border-radius: 8px;
    }
    .film-scene-card {
      border: 1px solid #2d2540; border-radius: 6px;
      padding: 10px; margin-bottom: 10px; font-size: 0.8rem;
    }
    .film-field { margin-bottom: 6px; line-height: 1.5; }
    .film-label { color: #64748b; font-size: 0.72rem; text-transform: uppercase; margin-right: 4px; }
    .film-prompt { color: #94a3b8; font-style: italic; }
    .film-spinner { color: #64748b; font-size: 0.82rem; padding: 12px 0; text-align: center; }
    .film-error { color: #f87171; font-size: 0.82rem; padding: 12px 0; }
    .film-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-shrink: 0; }
    .film-header h2 { margin: 0; font-size: 1rem; }
    #film-preview-toggle { display: none; font-size: 0.75rem; padding: 2px 8px; cursor: pointer; }
    .focus-panel { display: flex; flex-direction: column; overflow: hidden; }
    .focus-panel .card { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 14px; }
    .focus-panel h2 { margin-bottom: 10px; font-size: 1rem; flex-shrink: 0; }

    .chat-messages {
      flex: 1; overflow-y: auto; padding: 12px;
      background: #0f0d14; border: 1px solid #2d2540;
      border-radius: 8px; margin-bottom: 10px;
    }
    .chat-bubble { margin-bottom: 10px; max-width: 85%; }
    .chat-bubble.user { margin-left: auto; text-align: right; }
    .chat-bubble.assistant { margin-right: auto; }
    .bubble-inner {
      display: inline-block; padding: 9px 13px; border-radius: 10px;
      font-size: 0.88rem; line-height: 1.65; white-space: pre-wrap;
    }
    .user .bubble-inner { background: #3b82f6; color: #fff; border-bottom-right-radius: 3px; }
    .assistant .bubble-inner { background: #1a1628; border: 1px solid #2d2540; color: #e2e8f0; border-bottom-left-radius: 3px; }
    .bubble-meta { font-size: 0.72rem; color: #64748b; margin-bottom: 3px; }
    .insert-btn {
      display: block; margin-top: 5px; padding: 3px 10px;
      background: transparent; border: 1px solid #3b82f6; color: #3b82f6;
      border-radius: 5px; font-size: 0.75rem; cursor: pointer;
    }
    .insert-btn:hover { background: rgba(59,130,246,0.08); }
    .sources-bar {
      font-size: 0.75rem; color: #64748b; padding: 4px 0 6px;
      border-bottom: 1px solid #2d2540; margin-bottom: 6px; flex-shrink: 0;
    }
    .chat-input-row { display: flex; gap: 8px; flex-shrink: 0; }
    .chat-input-row textarea { flex: 1; min-height: 50px; max-height: 110px; resize: vertical; }
    .chat-hint { margin-top: 6px; font-size: 0.75rem; color: #64748b; flex-shrink: 0; }

    .editor-toolbar {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 10px; flex-wrap: wrap; flex-shrink: 0;
    }
    .editor-toolbar input[type="text"] { flex: 1; min-width: 160px; }
    .save-status { font-size: 0.75rem; color: #64748b; }
    #manuscript-editor { flex: 1; resize: none; width: 100%; font-family: monospace; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="layout">
  {{template "nav" .}}
  <main class="main-content">
    <div class="page-header" style="margin-bottom:12px">
      <h1>Focus Chat Mode</h1>
      <p>左側與 AI 寫作夥伴對話，右側直接編輯稿件。點「▼ 插入稿件」可將 AI 回覆貼入游標位置。</p>
    </div>

    <div class="focus-layout">
      <!-- 左側：AI 對話 -->
      <div class="focus-panel">
        <div class="card">
          <h2>AI 寫作夥伴</h2>
          <div id="sources-bar" class="sources-bar" style="display:none"></div>
          <div class="chat-messages" id="chat-messages">
            <p style="color:#94a3b8;text-align:center;font-size:0.85rem">開始輸入，AI 將自動參考角色設定、章節摘要、伏筆清單與右側稿件</p>
          </div>
          <div class="chat-input-row">
            <textarea id="chat-input" placeholder="輸入你的問題或創作需求…" onkeydown="handleKey(event)"></textarea>
            <button class="btn" id="send-btn" type="button" onclick="sendMessage()">送出</button>
          </div>
          <div class="chat-hint">Enter 送出，Shift+Enter 換行</div>
        </div>
      </div>

      <!-- 中：稿件編輯器 -->
      <div class="focus-panel">
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-shrink:0">
            <h2 style="margin:0">稿件編輯器</h2>
            <button id="film-preview-toggle" class="btn btn-ghost btn-sm" type="button" onclick="toggleFilmPreview()">▶ Film Preview</button>
          </div>
          <div class="editor-toolbar">
            <select id="chapter-select" onchange="loadChapter()">
              <option value="">— 新稿件 —</option>
              {{range .Chapters}}
              <option value="{{.Name}}">{{.Title}}</option>
              {{end}}
            </select>
            <input type="text" id="chapter-name" placeholder="章節檔名（例：第二章-主角覺醒.md）">
            <button class="btn btn-ghost btn-sm" type="button" onclick="saveChapter()">儲存</button>
            <span class="save-status" id="save-status"></span>
          </div>
          <textarea id="manuscript-editor" placeholder="在此撰寫或貼入章節內容…"></textarea>
        </div>
      </div>
      <!-- 右：Film Preview（桌面版） -->
      <div class="film-preview-panel">
        <div class="card" style="flex:1;display:flex;flex-direction:column;overflow:hidden;padding:14px">
          <div class="film-header">
            <h2>Film Preview</h2>
            <button class="btn btn-ghost btn-sm" type="button" onclick="toggleFilmPreview()">◀ 隱藏</button>
          </div>
          <div class="film-preview-inner">
            <div id="film-spinner" class="film-spinner" style="display:none">正在分析…</div>
            <div id="film-error" class="film-error" style="display:none"></div>
            <div id="film-content" style="display:none"></div>
            <p id="film-placeholder" style="color:#64748b;font-size:0.82rem;text-align:center">停止輸入 1.5 秒後自動預覽</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const chatHistory = [];
let isStreaming = false;

function escHTML(t) {
  return String(t || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showSources(items) {
  const bar = document.getElementById('sources-bar');
  if (!items || items.length === 0) { bar.style.display = 'none'; return; }
  const names = items.map(i => i.name || i.id || '').filter(Boolean).join('、');
  bar.textContent = `本次參考：${names}`;
  bar.style.display = 'block';
}

function addInsertButton(bubbleWrap, text) {
  const btn = document.createElement('button');
  btn.className = 'insert-btn';
  btn.textContent = '▼ 插入稿件';
  btn.onclick = () => insertAtCursor(text);
  bubbleWrap.appendChild(btn);
}

async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message) return;
  input.value = '';

  // 使用者泡泡
  const box = document.getElementById('chat-messages');
  box.querySelector('p')?.remove();
  const userWrap = document.createElement('div');
  userWrap.className = 'chat-bubble user';
  userWrap.innerHTML = `<div class="bubble-meta">作者</div><div class="bubble-inner">${escHTML(message)}</div>`;
  box.appendChild(userWrap);
  box.scrollTop = box.scrollHeight;

  const chapterFile = document.getElementById('chapter-select').value;
  const chapterContent = document.getElementById('manuscript-editor').value;

  isStreaming = true;
  document.getElementById('send-btn').disabled = true;

  // AI 泡泡（串流中）
  const aiWrap = document.createElement('div');
  aiWrap.className = 'chat-bubble assistant';
  aiWrap.innerHTML = '<div class="bubble-meta">AI助理</div><div class="bubble-inner"></div>';
  box.appendChild(aiWrap);
  box.scrollTop = box.scrollHeight;
  const bubbleEl = aiWrap.querySelector('.bubble-inner');
  let replyText = '';

  try {
    const resp = await fetch('/focus/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, history: chatHistory, chapter_file: chapterFile, chapter_content: chapterContent })
    });
    if (!resp.ok) throw new Error(await resp.text());

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event:')) {
          eventType = line.slice(6).trim();
        } else if (line.startsWith('data:')) {
          try {
            const payload = JSON.parse(line.slice(5).trim());
            if (eventType === 'chunk') {
              replyText += payload.text || '';
              bubbleEl.textContent = replyText;
              box.scrollTop = box.scrollHeight;
            } else if (eventType === 'sources') {
              showSources(payload.items);
            }
          } catch (_) {}
          eventType = '';
        }
      }
    }

    chatHistory.push({ role: 'user', content: message });
    chatHistory.push({ role: 'assistant', content: replyText });
    addInsertButton(aiWrap, replyText);
  } catch (e) {
    bubbleEl.textContent = '⚠️ 發生錯誤：' + e.message;
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function insertAtCursor(text) {
  const ta = document.getElementById('manuscript-editor');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  ta.setRangeText(text, start, end, 'end');
  ta.focus();
}

async function loadChapter() {
  const name = document.getElementById('chapter-select').value;
  if (!name) {
    document.getElementById('chapter-name').value = '';
    document.getElementById('manuscript-editor').value = '';
    document.getElementById('save-status').textContent = '';
    return;
  }
  document.getElementById('chapter-name').value = name;
  try {
    let content = '';
    if (window.go && window.go.desktop && window.go.desktop.App) {
      content = await window.go.desktop.App.LoadChapter(name);
    } else {
      const resp = await fetch('/api/chapters/' + encodeURIComponent(name));
      const data = await resp.json();
      content = data.content || '';
    }
    document.getElementById('manuscript-editor').value = content;
  } catch (e) {
    alert('載入失敗：' + e.message);
  }
}

async function saveChapter() {
  const name = document.getElementById('chapter-name').value.trim();
  const content = document.getElementById('manuscript-editor').value;
  if (!name) { alert('請輸入章節檔名'); return; }
  const status = document.getElementById('save-status');
  status.textContent = '儲存中…';
  try {
    let title = name;
    if (window.go && window.go.desktop && window.go.desktop.App) {
      title = await window.go.desktop.App.SaveChapter(name, content);
    } else {
      const resp = await fetch('/api/chapters', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, content })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || '儲存失敗');
      title = data.title || name;
    }
    status.textContent = `已儲存：${title}`;
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch (e) {
    status.textContent = '錯誤：' + e.message;
  }
}

// ── Film Preview（桌面版限定）────────────────────────────────────────────────
let filmTimer = null;
let filmReqId = 0;

function initFilmPreview() {
  if (!window.go?.desktop?.App) return;
  document.getElementById('film-preview-toggle').style.display = 'inline-block';
  document.getElementById('manuscript-editor').addEventListener('input', () => {
    clearTimeout(filmTimer);
    filmTimer = setTimeout(triggerFilmPreview, 1500);
  });
}

function toggleFilmPreview() {
  const layout = document.querySelector('.focus-layout');
  layout.classList.toggle('with-preview');
}

async function triggerFilmPreview() {
  if (!window.go?.desktop?.App) return;
  if (!document.querySelector('.focus-layout').classList.contains('with-preview')) return;
  const text = document.getElementById('manuscript-editor').value.trim();
  if (!text) return;

  const myId = ++filmReqId;
  const chapterName = document.getElementById('chapter-select').value || 'preview';
  document.getElementById('film-placeholder').style.display = 'none';
  document.getElementById('film-spinner').style.display = 'block';
  document.getElementById('film-error').style.display = 'none';
  document.getElementById('film-content').style.display = 'none';

  try {
    const scenes = await window.go.desktop.App.PreviewFilmScene(chapterName, text);
    if (myId !== filmReqId) return;
    renderFilmPreview(scenes);
  } catch (e) {
    if (myId !== filmReqId) return;
    document.getElementById('film-spinner').style.display = 'none';
    const err = document.getElementById('film-error');
    err.textContent = '分析失敗：' + (e.message ?? e);
    err.style.display = 'block';
  }
}

function renderFilmPreview(scenes) {
  document.getElementById('film-spinner').style.display = 'none';
  const content = document.getElementById('film-content');
  if (!scenes || scenes.length === 0) {
    const err = document.getElementById('film-error');
    err.textContent = '未能解析出場景';
    err.style.display = 'block';
    return;
  }
  content.innerHTML = scenes.map(s => {
    const chars = (s.characters || []).map(c => {
      const parts = [escHTML(c.name)];
      if (c.appearance) parts.push(escHTML(c.appearance));
      if (c.action) parts.push(escHTML(c.action));
      return parts.join(' · ');
    }).join('<br>');
    return `<div class="film-scene-card">
      <div class="film-field"><span class="film-label">場景</span>${escHTML(s.scene_id)}</div>
      <div class="film-field"><span class="film-label">地點</span>${escHTML(s.location)}</div>
      <div class="film-field"><span class="film-label">時間</span>${escHTML(s.time)} · ${escHTML(s.mood)}</div>
      ${chars ? `<div class="film-field"><span class="film-label">角色</span><br>${chars}</div>` : ''}
      <div class="film-field film-prompt"><span class="film-label">Prompt</span><br>${escHTML(s.video_prompt)}</div>
    </div>`;
  }).join('');
  content.style.display = 'block';
}

window.addEventListener('DOMContentLoaded', initFilmPreview);
</script>
</body>
</html>
{{end}}
